name: Daily Research Agent

on:
  schedule:
    # 01:30 UTC = 10:30 KST — daily brief generation
    # 02:00 UTC = 11:00 KST — full report generation
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      tickers:
        description: "Comma-separated tickers to override (optional)"
        required: false
        default: ""
      skip_brief:
        description: "Skip daily brief generation"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  daily-brief:
    name: Generate Daily Market Brief
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_brief != 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Fetch reference site insights
        id: fetch-refs
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          echo "=== Fetching market context for daily brief ==="

          # Fetch news from Alpha Vantage for key tickers
          if [ -n "$ALPHA_VANTAGE_API_KEY" ]; then
            echo "Fetching Alpha Vantage news..."
            curl -s "https://www.alphavantage.co/query?function=NEWS_SENTIMENT&tickers=NVDA,MU,AMAT&limit=10&apikey=${ALPHA_VANTAGE_API_KEY}" \
              -o /tmp/av-news.json || echo "AV fetch failed"

            # Extract headlines for context
            if [ -f /tmp/av-news.json ]; then
              node -e "
                const fs = require('fs');
                const data = JSON.parse(fs.readFileSync('/tmp/av-news.json'));
                const feed = data.feed || [];
                const headlines = feed.slice(0, 8).map(n => '- ' + n.title).join('\n');
                fs.writeFileSync('/tmp/news-context.txt', headlines || '(no news)');
                console.log('Headlines extracted:', feed.length);
              " || echo "(no news extracted)"
            fi
          fi

          # Record reference site check timestamp (actual scraping needs headless browser)
          DATE=$(date -u +"%Y-%m-%d")
          echo "Reference sites checked: ${DATE}" > /tmp/ref-check.txt
          echo "- https://newmoneymoves.io/ (manual review recommended)" >> /tmp/ref-check.txt
          echo "- https://blog.naver.com/ranto28 (manual review recommended)" >> /tmp/ref-check.txt

          echo "date=${DATE}" >> $GITHUB_OUTPUT

      - name: Generate daily brief via Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          DATE="${{ steps.fetch-refs.outputs.date }}"
          BRIEF_FILE="content/blog/brief-${DATE}.md"

          # Skip if brief for today already exists
          if [ -f "$BRIEF_FILE" ]; then
            echo "Brief for ${DATE} already exists, skipping."
            exit 0
          fi

          NEWS_CONTEXT=""
          if [ -f /tmp/news-context.txt ]; then
            NEWS_CONTEXT=$(cat /tmp/news-context.txt)
          fi

          # Generate brief using extracted script (avoids YAML block scalar issues)
          DATE="$DATE" BRIEF_FILE="$BRIEF_FILE" NEWS_CONTEXT="$NEWS_CONTEXT" \
            node scripts/generate-brief.js

      - name: Commit daily brief
        run: |
          git config user.name "Research Bot"
          git config user.email "research-bot@github-actions"
          git add content/

          if git diff --cached --quiet; then
            echo "No brief to commit."
          else
            DATE="${{ steps.fetch-refs.outputs.date }}"
            git commit -m "📝 Daily Brief: ${DATE}"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          fi

  run-research:
    name: Generate Research Reports
    runs-on: ubuntu-latest
    needs: daily-brief
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run daily research script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          OVERRIDE_TICKERS: ${{ github.event.inputs.tickers }}
        run: npm run research

      - name: Commit generated reports
        run: |
          git config user.name "Research Bot"
          git config user.email "research-bot@github-actions"

          git add reports/ data/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "🤖 Daily Research Update: ${DATE}"
            # Pull rebase to handle any commits pushed by daily-brief job
            git pull --rebase https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main || true
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          fi
